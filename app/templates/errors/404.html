{% extends "base.html" %}
{% block title %}Page Not Found - BenchmarkWatcher{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 py-12">
    <p class="font-serif font-bold leading-none text-7xl sm:text-8xl text-brand-claret">404</p>
    <h1 class="mt-6 font-serif font-bold text-2xl sm:text-3xl text-brand-black-80 dark:text-white">Page not found</h1>
    <p class="mt-3 max-w-md font-ui text-brand-black-60 dark:text-brand-black-60">
        The benchmark or page you're looking for doesn't exist or may have moved.
    </p>
    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
        <a href="/" class="inline-block px-5 py-2.5 rounded-lg bg-[var(--brand-teal)] text-white font-medium font-ui hover:opacity-90 transition-opacity">Back to dashboard</a>
        <a href="/?view=compact" class="inline-block px-5 py-2.5 rounded-lg border border-brand-black-60/20 dark:border-white/15 text-brand-black-80 dark:text-white font-medium font-ui hover:bg-brand-black-60/5 transition-colors">Browse all benchmarks</a>
    </div>
</div>
{% endblock %}
