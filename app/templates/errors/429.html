{% extends "base.html" %}
{% block title %}Rate Limited - BenchmarkWatcher{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 py-12">
    <p class="font-serif font-bold leading-none text-7xl sm:text-8xl text-brand-claret">429</p>
    <h1 class="mt-6 font-serif font-bold text-2xl sm:text-3xl text-brand-black-80 dark:text-white">Too many requests</h1>
    <p class="mt-3 max-w-md font-ui text-brand-black-60 dark:text-brand-black-60">
        You've reached the request limit. Please wait about a minute, then try again — this keeps data fresh for everyone.
    </p>
    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
        <a href="/" class="inline-block px-5 py-2.5 rounded-lg bg-[var(--brand-teal)] text-white font-medium font-ui hover:opacity-90 transition-opacity">Back to dashboard</a>
    </div>
</div>
{% endblock %}
